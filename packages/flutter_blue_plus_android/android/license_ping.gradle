import groovy.json.JsonOutput
import java.nio.charset.StandardCharsets
import java.security.MessageDigest
import java.text.SimpleDateFormat
import java.util.regex.Pattern

def getUtcDay() {
    def formatter = new SimpleDateFormat("yyyy-MM-dd")
    formatter.setTimeZone(TimeZone.getTimeZone("UTC"))
    return formatter.format(new Date())
}

def normalizeVersionValue(String rawVersion) {
    if (rawVersion == null) {
        return null
    }

    def version = rawVersion.trim()
    if (version.startsWith('"') && version.endsWith('"') && version.length() >= 2) {
        return version.substring(1, version.length() - 1)
    }

    return version
}

def getPackageVersionFromLockfile(File lockfile, String packageName) {
    if (!lockfile.exists()) {
        return null
    }

    def lines = lockfile.readLines(StandardCharsets.UTF_8.name())
    def inTargetPackage = false

    for (String line : lines) {
        if (line.trim() == "${packageName}:") {
            inTargetPackage = true
            continue
        }

        if (inTargetPackage && !line.startsWith("  ")) {
            inTargetPackage = false
        }

        if (!inTargetPackage) {
            continue
        }

        if (line.trim().startsWith("version:")) {
            return normalizeVersionValue(line.trim().substring("version:".length()))
        }
    }

    return null
}

def getPackageVersionFromPubspec(File pubspecFile) {
    if (!pubspecFile.exists()) {
        return null
    }

    def matcher = pubspecFile.getText(StandardCharsets.UTF_8.name()) =~ /(?m)^version:\s*(.+)$/
    return matcher.find() ? normalizeVersionValue(matcher.group(1)) : null
}

def getAppLabelValue(File manifestFile) {
    if (!manifestFile.exists()) {
        return null
    }

    def manifestText = manifestFile.getText(StandardCharsets.UTF_8.name())
    def matcher = manifestText =~ /<application\b[^>]*android:label="([^"]+)"/
    return matcher.find() ? matcher.group(1).trim() : null
}

def resolveStringResource(Collection<File> resDirs, String resourceName) {
    for (File resDir : resDirs) {
        def stringsFile = new File(resDir, "values/strings.xml")
        if (!stringsFile.exists()) {
            continue
        }

        def stringsText = stringsFile.getText(StandardCharsets.UTF_8.name())
        def matcher = stringsText =~ /<string\s+name="${Pattern.quote(resourceName)}">(.*?)<\/string>/
        if (matcher.find()) {
            return matcher.group(1).trim()
        }
    }

    return null
}

def resolveAppName(Project appProject, String appPackage) {
    def androidExtension = appProject.extensions.findByName("android")
    if (androidExtension == null) {
        return appPackage
    }

    def manifestFile = androidExtension.sourceSets?.main?.manifest?.srcFile
    def rawLabel = manifestFile != null ? getAppLabelValue(manifestFile) : null
    if (rawLabel == null || rawLabel.isEmpty()) {
        return appPackage
    }

    if (rawLabel.startsWith("@string/")) {
        def resourceName = rawLabel.substring("@string/".length())
        def resolved = resolveStringResource(androidExtension.sourceSets.main.res.srcDirs, resourceName)
        return resolved ?: appPackage
    }

    return rawLabel
}

def sha256Hex(String raw) {
    def digest = MessageDigest.getInstance("SHA-256")
    def bytes = digest.digest(raw.getBytes(StandardCharsets.UTF_8))
    def builder = new StringBuilder(bytes.length * 2)

    for (byte b : bytes) {
        builder.append(String.format("%02x", b & 0xff))
    }

    return builder.toString()
}

def sendLicensePing(Map<String, String> payload) {
    def connection = null

    try {
        connection = new URL("https://script.google.com/macros/s/AKfycbw5p3QADW-p-6I8eTQuLsu9it_qVMj_HJwUqalHyQw6-BjmabpNljdyy1EFv0lRNmfb/exec")
            .openConnection()
        connection.setRequestMethod("POST")
        connection.setConnectTimeout(3000)
        connection.setReadTimeout(3000)
        connection.setDoOutput(true)
        connection.setRequestProperty("Content-Type", "application/json")

        connection.outputStream.withWriter(StandardCharsets.UTF_8.name()) { writer ->
            writer << JsonOutput.toJson(payload)
        }

        connection.responseCode
    } catch (Throwable ignored) {
        // Intentionally fail open so builds continue even if the ping fails.
    } finally {
        connection?.disconnect()
    }
}

def registerLicensePing(Project appProject) {
    def androidExtension = appProject.extensions.findByName("android")
    if (androidExtension == null || !androidExtension.hasProperty("applicationVariants")) {
        return
    }

    def flutterProjectDir = appProject.rootProject.projectDir.parentFile
    def flutterLockfile = new File(flutterProjectDir, "pubspec.lock")
    def fallbackPubspec = new File(project.projectDir.parentFile, "pubspec.yaml")
    def fbpVersion = getPackageVersionFromLockfile(flutterLockfile, "flutter_blue_plus") ?:
        getPackageVersionFromPubspec(fallbackPubspec) ?:
        "unknown"

    androidExtension.applicationVariants.all { variant ->
        def taskName = "flutterBluePlusLicensePing${variant.name.capitalize()}"

        if (appProject.tasks.findByName(taskName) != null) {
            return
        }

        def pingTask = appProject.tasks.create(name: taskName) {
            doLast {
                def day = getUtcDay()
                def appPackage = variant.applicationId?.toString()?.trim()
                def appVersion = variant.versionName?.toString()?.trim()

                if (!appPackage || !appVersion) {
                    return
                }

                def appName = resolveAppName(appProject, appPackage)
                def signature = sha256Hex([
                    day,
                    appPackage,
                    appName,
                    appVersion,
                    fbpVersion,
                ].join("|"))

                sendLicensePing([
                    day: day,
                    appPackage: appPackage,
                    appName: appName,
                    appVersion: appVersion,
                    fbpVersion: fbpVersion,
                    signature: signature,
                ])
            }
        }

        def preBuildTask = appProject.tasks.findByName("pre${variant.name.capitalize()}Build")
        if (preBuildTask != null) {
            preBuildTask.dependsOn(pingTask)
        } else {
            appProject.tasks.findByName("preBuild")?.dependsOn(pingTask)
        }
    }
}

gradle.projectsEvaluated {
    rootProject.subprojects.each { subproject ->
        if (subproject.plugins.hasPlugin("com.android.application")) {
            registerLicensePing(subproject)
        }
    }
}
